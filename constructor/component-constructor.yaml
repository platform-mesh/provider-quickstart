components:
  - name: github.com/platform-mesh/provider-quickstart
    version: {{ .VERSION }}
    provider:
      name: platform-mesh
    resources:
      - name: controller-chart
        type: helmChart
        version: {{ .CHART_VERSION }}
        input:
          type: helm
          path: ../deploy/helm/wildwest-controller
          # Override the chart's Chart.yaml version so the packaged OCI artifact is
          # tagged from the build tag (CHART_VERSION), not the hardcoded Chart.yaml
          # value. Keeps the OCM artifact tag in lockstep with the resource version.
          version: {{ .CHART_VERSION }}
      - name: portal-chart
        type: helmChart
        version: {{ .CHART_VERSION }}
        input:
          type: helm
          path: ../deploy/helm/wildwest-portal
          version: {{ .CHART_VERSION }}
      - name: armament-sync-chart
        type: helmChart
        version: {{ .CHART_VERSION }}
        input:
          type: helm
          path: ../deploy/helm/wildwest-armament-sync
          version: {{ .CHART_VERSION }}
      - name: controller-image
        type: ociImage
        relation: local
        version: {{ .IMAGE_VERSION }}
        access:
          type: ociArtifact
          imageReference: ghcr.io/platform-mesh/provider-quickstart:{{ .OCI_TAG }}
      - name: portal-image
        type: ociImage
        relation: local
        version: {{ .IMAGE_VERSION }}
        access:
          type: ociArtifact
          imageReference: ghcr.io/platform-mesh/provider-quickstart-portal:{{ .OCI_TAG }}
      - name: armament-sync-image
        type: ociImage
        relation: local
        version: {{ .IMAGE_VERSION }}
        access:
          type: ociArtifact
          imageReference: ghcr.io/platform-mesh/provider-quickstart-armament-sync:{{ .OCI_TAG }}
      - name: kcp-manifests
        type: directoryTree
        version: {{ .VERSION }}
        input:
          type: dir
          path: ../config/kcp
          compress: true
