components:
  - name: github.com/platform-mesh/provider-quickstart
    version: {{ .VERSION }}
    provider:
      name: platform-mesh
    resources:
      - name: controller-chart
        type: helmChart
        version: {{ .CHART_VERSION }}
        input:
          type: helm
          path: ../deploy/helm/wildwest-controller
      - name: portal-chart
        type: helmChart
        version: {{ .CHART_VERSION }}
        input:
          type: helm
          path: ../deploy/helm/wildwest-portal
      - name: controller-image
        type: ociImage
        relation: local
        version: {{ .IMAGE_VERSION }}
        access:
          type: ociArtifact
          imageReference: ghcr.io/platform-mesh/provider-quickstart:{{ .OCI_TAG }}
      - name: portal-image
        type: ociImage
        relation: local
        version: {{ .IMAGE_VERSION }}
        access:
          type: ociArtifact
          imageReference: ghcr.io/platform-mesh/provider-quickstart-portal:{{ .OCI_TAG }}
      - name: kcp-manifests
        type: directoryTree
        version: {{ .VERSION }}
        input:
          type: dir
          path: ../config/kcp
          compress: true
