{{- if .Values.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "wildwest-portal.fullname" . }}
  namespace: {{ .Values.httpRoute.namespace | default "platform-mesh-system" }}
  labels:
    {{- include "wildwest-portal.labels" . | nindent 4 }}
spec:
  hostnames:
    {{- range .Values.httpRoute.hostnames }}
    - {{ . | quote }}
    {{- end }}
  parentRefs:
    {{- range .Values.httpRoute.parentRefs }}
    - group: {{ .group }}
      kind: {{ .kind }}
      name: {{ .name }}
      namespace: {{ .namespace }}
    {{- end }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ include "wildwest-portal.fullname" . }}
          namespace: {{ .Release.Namespace }}
          port: {{ .Values.service.port }}
          weight: 1
      {{- if .Values.httpRoute.filters }}
      filters:
        {{- toYaml .Values.httpRoute.filters | nindent 8 }}
      {{- end }}
      matches:
        - path:
            type: PathPrefix
            value: {{ .Values.httpRoute.pathPrefix | default "/cowboys" }}
{{- end }}
