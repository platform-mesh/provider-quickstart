replicaCount: 1

image:
  repository: ghcr.io/platform-mesh/provider-quickstart-armament-sync
  pullPolicy: IfNotPresent
  # Empty -> falls back to the chart appVersion. CI packages the chart with
  # --app-version=<release tag> (matching the image tag pushed by the
  # build-armament-sync job), so the published chart pulls the matching image.
  tag: "@sha256:afac1229086ad054d2b1250492fdf01ea0005f2ceb7af176773a98f79ebbd0ff"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Syncer configuration
syncer:
  # How often to reconcile the local Armament catalog against the external source.
  interval: 30s

# kcp kubeconfig secret. The syncer needs write access to Armament CRs in the
# provider workspace, so it reuses the same controller kubeconfig produced by
# `make init` unless overridden.
kubeconfig:
  secretName: "wildwest-controller-kubeconfig"
  secretKey: "kubeconfig"
