apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wildwest-controller.fullname" . }}
  labels:
    {{- include "wildwest-controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "wildwest-controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "wildwest-controller.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "wildwest-controller.serviceAccountName" . }}
{{ include "common.hostAliases" $ | nindent 6 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.init.enabled }}
      initContainers:
        - name: bootstrap
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "wildwest-controller.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/wild-west-init"]
          args:
            {{- if .Values.init.seedWorkspaces }}
            - --seed-workspaces
            - --parent-workspace={{ .Values.init.parentWorkspace }}
            {{- range .Values.init.workspaces }}
            - --workspace={{ . }}
            {{- end }}
            {{- end }}
            {{- with .Values.init.hostOverride }}
            - --host-override={{ . }}
            {{- end }}
          env:
            - name: KUBECONFIG
              value: /etc/kcp-init/kubeconfig
          volumeMounts:
            - name: init-kubeconfig
              mountPath: /etc/kcp-init
              readOnly: true
          resources:
            {{- toYaml .Values.init.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "wildwest-controller.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --endpointslice={{ .Values.controller.endpointSlice }}
          env:
            - name: KUBECONFIG
              value: /etc/kcp/kubeconfig
          ports:
            - name: metrics
              containerPort: 9080
              protocol: TCP
            - name: health
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: kubeconfig
              mountPath: /etc/kcp
              readOnly: true
      volumes:
        - name: kubeconfig
          secret:
            secretName: {{ .Values.kubeconfig.secretName }}
            items:
              - key: {{ .Values.kubeconfig.secretKey }}
                path: kubeconfig
        {{- if .Values.init.enabled }}
        - name: init-kubeconfig
          secret:
            secretName: {{ required "init.kubeconfig.secretName is required when init.enabled is true" .Values.init.kubeconfig.secretName }}
            items:
              - key: {{ .Values.init.kubeconfig.secretKey }}
                path: kubeconfig
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
