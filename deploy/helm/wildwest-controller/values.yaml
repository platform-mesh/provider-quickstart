replicaCount: 1

image:
  repository: ghcr.io/platform-mesh/provider-quickstart
  pullPolicy: IfNotPresent
  tag: "@sha256:9a039d5d2c6a83828b8a91b82225f16646155a5623e172cb30e0c0c8883d124b"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Controller configuration
controller:
  endpointSlice: "wildwest.platform-mesh.io"

# kcp kubeconfig secret
kubeconfig:
  secretName: "wildwest-controller-kubeconfig"
  secretKey: "kubeconfig"
