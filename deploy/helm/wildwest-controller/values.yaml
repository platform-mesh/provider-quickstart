replicaCount: 1

image:
  repository: ghcr.io/platform-mesh/provider-quickstart
  pullPolicy: IfNotPresent
  tag: "@sha256:108c06e2735fe89bed7d67ccc579a72fa1e5a2e49c2c9a86c297e5bcfcdbf82a"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Controller configuration
controller:
  endpointSlice: "wildwest.platform-mesh.io"

# kcp kubeconfig secret
kubeconfig:
  secretName: "wildwest-controller-kubeconfig"
  secretKey: "kubeconfig"
